SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = [
    "v1/index.json",
    "v1/releases/**",
    "v2/registry.json",
    "v2/index.json",
    "v2/releases/**",
    "v2/.state.json",
    "gdvm/v1/releases.json",
]
