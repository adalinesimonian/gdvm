version = 1

[[annotations]]
path = [
    ".prettierrc",
    ".vscode/**",
    "v1/package.json",
    "v1/package-lock.json",
    "v2/package.json",
    "v2/package-lock.json",
    "v2/tsconfig.json",
    "gdvm/v1/package.json",
    "gdvm/v1/package-lock.json",
    "gdvm/v1/tsconfig.json",
]
