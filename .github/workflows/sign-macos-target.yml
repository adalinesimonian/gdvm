name: Sign macOS Target

on:
  workflow_call:
    inputs:
      os:
        description: "Runner OS for this signing job."
        required: true
        type: string
      target:
        description: "Rust target triple to sign."
        required: true
        type: string
      ref:
        description: "Ref to check out and build."
        required: false
        type: string

permissions:
  contents: read

jobs:
  sign:
    name: Sign (${{ inputs.os }}, ${{ inputs.target }})
    runs-on: ${{ inputs.os }}
    environment: macos-signing
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          target: ${{ inputs.target }}
          rustflags: ""
          cache-shared-key: ${{ inputs.target }}
          cache-workspaces: ${{ github.workspace }}

      - name: Set up signing keychain
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/cert.p12"
          keychain="$RUNNER_TEMP/signing.keychain-db"
          kc_pass="$(openssl rand -base64 24)"
          echo "SIGN_KEYCHAIN=$keychain" >> "$GITHUB_ENV"

          printf '%s' "$MACOS_CERT_P12_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$kc_pass" "$keychain"
          security set-keychain-settings -lut 3600 "$keychain"
          security unlock-keychain -p "$kc_pass" "$keychain"
          security import "$cert_path" -P "$MACOS_CERT_PASSWORD" \
            -t cert -f pkcs12 -k "$keychain" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$kc_pass" "$keychain" >/dev/null
          security list-keychain -d user -s "$keychain"
          rm -f "$cert_path"

      - name: Build and sign
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          t="${{ inputs.target }}"

          cargo build --release --target "$t" \
            --manifest-path crates/shim/Cargo.toml --target-dir intermediate
          shim="intermediate/$t/release/shim"
          codesign --force --timestamp --options runtime \
            --keychain "$SIGN_KEYCHAIN" --sign "$MACOS_SIGN_IDENTITY" "$shim"
          codesign --verify --strict --verbose=2 "$shim"

          GDVM_PREBUILT_SHIM="$PWD/$shim" cargo build --release --target "$t" -p gdvm
          gdvm="target/$t/release/gdvm"
          codesign --force --timestamp --options runtime \
            --keychain "$SIGN_KEYCHAIN" --sign "$MACOS_SIGN_IDENTITY" "$gdvm"
          codesign --verify --strict --verbose=2 "$gdvm"

          mkdir -p notarize
          cp "$shim" notarize/shim
          cp "$gdvm" notarize/gdvm
          tar -cf binary.tar -C "target/$t/release" gdvm

      - name: Notarize
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/asc_key.p8"
          printf '%s' "$ASC_API_KEY_P8_BASE64" | base64 --decode > "$key_path"
          ditto -c -k notarize notarize.zip
          xcrun notarytool submit notarize.zip \
            --key "$key_path" --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID" \
            --wait --timeout 30m | tee notary.log
          rm -f "$key_path"
          grep -qE "status: Accepted" notary.log

      - name: Upload signed binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ inputs.target }}
          path: binary.tar
          overwrite: true
          retention-days: 1

      - name: Clean up signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/asc_key.p8"
