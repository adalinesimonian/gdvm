name: Validate gdvm release registry (v1)

on:
  push:
    branches:
      - registry
    paths:
      - "gdvm/v1/**"
      - ".github/workflows/gdvm-v1-validate.yml"
  pull_request:
    branches:
      - registry
    paths:
      - "gdvm/v1/**"
      - ".github/workflows/gdvm-v1-validate.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout registry
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: "gdvm/v1/package.json"

      - name: Validate gdvm release manifest
        run: node ./gdvm/v1/validate.mts
