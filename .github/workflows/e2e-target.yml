name: End-to-End Target

on:
  workflow_call:
    inputs:
      os:
        description: "Runner OS for this end-to-end test"
        required: true
        type: string
      target:
        description: "Rust target triple under test"
        required: true
        type: string
      verify_signature:
        description: "Verify the code signature of the binaries."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  e2e:
    name: End-to-End Tests (${{ inputs.os }}, ${{ inputs.target }})
    # Just for end-to-end tests, substitute the macos-latest runner when testing
    # the x86_64 target, with macos-15-intel since otherwise the tests are
    # unbelievably slow under Rosetta.
    # TODO: Remove before Fall 2027 when macos-15-intel is slated for removal.
    runs-on: ${{ inputs.os == 'macos-latest' && inputs.target == 'x86_64-apple-darwin' && 'macos-15-intel' || inputs.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1

      - name: Download binary artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binary-${{ inputs.target }}

      - name: Extract binary artifact
        run: tar -xvf binary.tar

      - name: Verify code signature (macOS)
        if: ${{ inputs.verify_signature && contains(inputs.os, 'macos') }}
        run: |
          set -euo pipefail
          codesign --verify --strict --verbose=2 gdvm
          codesign -dvvv gdvm 2>&1 | tee /tmp/codesign.txt
          grep -q "Authority=Developer ID Application" /tmp/codesign.txt
          grep -qE "flags=0x[0-9a-f]*\(.*runtime.*\)" /tmp/codesign.txt
          echo "Signature OK"

      - name: Verify code signature (Windows)
        if: ${{ inputs.verify_signature && contains(inputs.os, 'windows') }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $sig = Get-AuthenticodeSignature ".\gdvm.exe"

          if ($sig.Status -ne 'Valid') {
            throw "gdvm.exe signature status: $($sig.Status)"
          }

          if (-not $sig.TimeStamperCertificate) {
            throw "gdvm.exe is not timestamped"
          }
          Write-Host "gdvm.exe signature OK: $($sig.SignerCertificate.Subject)"

      - name: Install 32-bit runtime libraries (Ubuntu i686)
        if: contains(inputs.os, 'ubuntu') && contains(inputs.target, 'i686')
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            libc6:i386 \
            libgcc-s1:i386 \
            libstdc++6:i386 \
            libssl3:i386 \
            zlib1g:i386 \
            libxcursor1:i386 \
            libxrandr2:i386 \
            libxinerama1:i386 \
            libxi6:i386 \
            libxrender1:i386 \
            libgl1:i386 \
            libglu1-mesa:i386

      - name: Install test dependencies (Ubuntu)
        if: contains(inputs.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fish

      - name: Install test dependencies (macOS)
        if: contains(inputs.os, 'macos')
        run: command -v fish >/dev/null 2>&1 || brew install fish

      - name: Install gdvm (*nix)
        if: contains(inputs.os, 'ubuntu') || contains(inputs.os, 'macos')
        run: |
          mkdir -p ~/.gdvm/bin
          cp ./gdvm ~/.gdvm/bin/gdvm
          echo "$HOME/.gdvm/bin" >> $GITHUB_PATH
          ~/.gdvm/bin/gdvm --version

      - name: Install gdvm (Windows)
        if: contains(inputs.os, 'windows')
        shell: bash
        run: |
          mkdir -p ~/.gdvm/bin
          cp ./gdvm.exe ~/.gdvm/bin/gdvm.exe
          echo "$HOME/.gdvm/bin" >> $GITHUB_PATH
          ~/.gdvm/bin/gdvm.exe --version

      - name: Verify shim code signature (macOS)
        if: ${{ inputs.verify_signature && contains(inputs.os, 'macos') }}
        run: |
          set -euo pipefail
          ~/.gdvm/bin/gdvm diagnose
          shim="$HOME/.gdvm/bin/godot"
          test -x "$shim"
          codesign --verify --strict --verbose=2 "$shim"
          codesign -dvvv "$shim" 2>&1 | tee /tmp/codesign-shim.txt
          grep -q "Authority=Developer ID Application" /tmp/codesign-shim.txt
          grep -qE "flags=0x[0-9a-f]*\(.*runtime.*\)" /tmp/codesign-shim.txt
          echo "Shim signature OK"

      - name: Verify shim code signature (Windows)
        if: ${{ inputs.verify_signature && contains(inputs.os, 'windows') }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & "$HOME\.gdvm\bin\gdvm.exe" diagnose

          foreach ($name in @("godot.exe", "godot_console.exe")) {
            $p = Join-Path $HOME ".gdvm\bin\$name"

            if (-not (Test-Path $p)) {
              throw "shim not found: $p"
            }

            $sig = Get-AuthenticodeSignature $p

            if ($sig.Status -ne 'Valid') {
              throw "$name signature status: $($sig.Status)"
            }

            if (-not $sig.TimeStamperCertificate) {
              throw "$name is not timestamped"
            }

            Write-Host "$name signature OK: $($sig.SignerCertificate.Subject)"
          }

      - name: Run end-to-end tests
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GDVM_E2E_TARGET: ${{ inputs.target }}
        run: bash scripts/run-e2e.sh
