name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string
      prerelease:
        description: "Mark as a pre-release"
        required: false
        default: false
        type: boolean
      social_post:
        description: "Optional Bluesky post text"
        required: false
        type: string
      post_to_bsky:
        description: "Post to Bluesky"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - name: Check out tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.release_tag }}

      - name: Validate release version against Cargo.toml and CHANGELOG.md
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          crate_version="$RELEASE_TAG"
          expected_version=$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' crates/gdvm/Cargo.toml | head -1)

          if [[ "$crate_version" != "v$expected_version" ]]; then
            echo "::error::Release version $crate_version does not match Cargo.toml version $expected_version."
            exit 1
          fi

          changelog_version=$(sed -nE 's/^## (v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?).*/\1/p' CHANGELOG.md | head -1)

          if [[ "$crate_version" != "$changelog_version" ]]; then
            echo "::error::Release version $crate_version does not match CHANGELOG.md version $changelog_version."
            exit 1
          fi

  build-and-test:
    name: Build, Lint, Test
    needs: validate
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/build-and-test.yml
    secrets: inherit
    with:
      ref: ${{ github.event.inputs.release_tag }}
      sign: true

  prepare-release:
    name: Prepare Release Content
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    outputs:
      post_text: ${{ steps.compute_post_text.outputs.text }}
    steps:
      - name: Check out tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.release_tag }}
          sparse-checkout: |
            CHANGELOG.md
            scripts/get-release-description.ps1

      - name: Generate release description
        shell: pwsh
        run: |
          & scripts/get-release-description.ps1 | Out-File -FilePath "release_description.md" -Encoding utf8

      - name: Determine Bluesky post text
        id: compute_post_text
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          SOCIAL_POST: ${{ github.event.inputs.social_post }}
        run: |
          set -euo pipefail

          post_text=$(printf '%s' "${SOCIAL_POST:-}" | jq -r --raw-input --slurp 'try (fromjson | tostring) catch .')

          post_text_trimmed="$(printf '%s' "$post_text" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$post_text_trimmed" ]; then
            post_text=$'${RELEASE_TAG} of gdvm is now out!\n\nUpgrade with `gdvm upgrade` or check out the latest improvements at https://github.com/adalinesimonian/gdvm/releases/tag/${RELEASE_TAG}\n\nReport any issues you may encounter at https://github.com/adalinesimonian/gdvm/issues. Thank you for using gdvm!'
          else
            post_text="$post_text_trimmed"
          fi

          printf '%s\n' "$post_text" > post_text.txt

          {
            echo 'text<<EOF'
            cat post_text.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Preview release body and post
        shell: bash
        run: |
          echo '----- Release body preview -----'
          cat release_description.md
          echo '----- Bluesky post preview -----'
          cat post_text.txt

      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-metadata
          path: |
            release_description.md
            post_text.txt
          retention-days: 1

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build-and-test, prepare-release]
    environment: release-approval
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      EXPECTED_TARGETS: |
        x86_64-unknown-linux-gnu
        i686-unknown-linux-gnu
        aarch64-unknown-linux-gnu
        x86_64-pc-windows-msvc
        i686-pc-windows-msvc
        aarch64-pc-windows-msvc
        x86_64-apple-darwin
        aarch64-apple-darwin
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-*

      - name: Download release metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-metadata
          path: release-metadata

      - name: Extract & rename binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          while IFS= read -r target; do
            [[ -z "$target" ]] && continue
            dir="binary-${target}"
            if [[ ! -d "$dir" ]]; then
              echo "::error::artifact for $target not found"
              exit 1
            fi

            tar -xf "$dir/binary.tar" -C "$dir"

            if [[ "$target" == *windows-msvc ]]; then
              mv "$dir/gdvm.exe" "dist/gdvm-${target}.exe"
            else
              mv "$dir/gdvm" "dist/gdvm-${target}"
              chmod +x "dist/gdvm-${target}"
            fi
          done <<< "$EXPECTED_TARGETS"

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/*

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          ( cd dist && sha256sum -- * > SHA256SUMS )
          echo 'SHA256SUMS:'
          cat dist/SHA256SUMS

      - name: Sign SHA256SUMS
        run: cosign sign-blob --yes --bundle dist/SHA256SUMS.bundle dist/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          body_path: release-metadata/release_description.md
          files: dist/*
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}

  update-gdvm-registry:
    name: Publish to gdvm release registry
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Check out registry branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: registry

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: "gdvm/v1/package.json"
          cache: npm
          cache-dependency-path: "gdvm/v1/package-lock.json"

      - name: Install dependencies
        working-directory: gdvm/v1
        run: npm ci

      - name: Update gdvm release manifest
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        working-directory: gdvm/v1
        run: node update-gdvm-releases.mts --tag "$RELEASE_TAG"

      - name: Validate manifest
        working-directory: gdvm/v1
        run: node validate.mts

      - name: Detect changes
        id: changes
        run: |
          shopt -s nullglob # In case no files match.
          files=(gdvm/v1/releases.json gdvm/v1/*/*.jsonl)
          git add "${files[@]}"
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push manifest
        if: steps.changes.outputs.changed == 'true'
        uses: planetscale/ghcommit-action@a6b150b81dca5dd027baa898604418eec9e11465 # v0.2.22
        with:
          commit_message: "chore(gdvm): publish ${{ github.event.inputs.release_tag }}"
          repo: ${{ github.repository }}
          branch: registry
          file_pattern: "gdvm/v1/releases.json gdvm/v1/*/*.jsonl"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  social-update:
    name: Update Social Media
    runs-on: ubuntu-latest
    needs: [publish, prepare-release]
    if: ${{ github.event.inputs.post_to_bsky != 'false' }}
    environment:
      name: socials
    steps:
      - name: Load post text
        id: post_text
        shell: bash
        env:
          POST_TEXT: ${{ needs['prepare-release'].outputs.post_text }}
        run: |
          printf '%s\n' "$POST_TEXT" > post_text.txt
          {
            echo 'text<<EOF'
            cat post_text.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Authenticate with Bluesky
        id: bsky_auth
        continue-on-error: true
        env:
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: |
          set -uo pipefail
          auth_payload=$(jq -n --arg id "gdvm.io" --arg pw "$BLUESKY_PASSWORD" \
            '{identifier: $id, password: $pw}')
          session_response=$(curl -s -X POST "https://bsky.social/xrpc/com.atproto.server.createSession" \
            -H "Content-Type: application/json" \
            --data-binary "$auth_payload")

          access_token=$(printf '%s' "$session_response" | jq -r '.accessJwt // empty')
          did=$(printf '%s' "$session_response" | jq -r '.did // empty')

          if [ -z "$access_token" ] || [ -z "$did" ]; then
            echo "❌ Failed to authenticate with Bluesky"
            exit 1
          fi

          echo "::add-mask::$access_token"
          {
            echo "token=$access_token"
            echo "did=$did"
          } >> "$GITHUB_OUTPUT"
          echo "Successfully authenticated with Bluesky."

      - name: Post release update to Bluesky
        continue-on-error: true
        if: ${{ steps.bsky_auth.outputs.token != '' }}
        env:
          BSKY_TOKEN: ${{ steps.bsky_auth.outputs.token }}
          BSKY_DID: ${{ steps.bsky_auth.outputs.did }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%S.%3NZ")

          post_text=$(jq -R -s '.' < post_text.txt)

          release_url="https://github.com/adalinesimonian/gdvm/releases/tag/${RELEASE_TAG}"

          facet_py='
          import json, os

          url = os.environ["RELEASE_URL"]

          with open("post_text.txt", "rb") as fh:
              tb = fh.read()
            
          urlbytes = url.encode("utf-8")
          out, i = [], tb.find(urlbytes)

          while i != -1:
              out.append({"index": {"byteStart": i, "byteEnd": i + len(urlbytes)},
                          "features": [{"$type": "app.bsky.richtext.facet#link", "uri": url}]})
              i = tb.find(urlbytes, i + len(urlbytes))

          print(json.dumps(out))
          '
          facets=$(RELEASE_URL="$release_url" python3 -c "$(printf '%s\n' "$facet_py" | sed 's/^          //')" || echo '[]')

          if [ -z "$facets" ]; then
            facets='[]'
          fi

          html_content=$(curl -s "$release_url")

          og_title=$(echo "$html_content" | grep -oP '<meta[^>]*property="og:title"[^>]*content="\K[^"]*' | head -1)
          if [ -z "$og_title" ]; then
            og_title="gdvm ${RELEASE_TAG} Release"
          fi

          og_description=$(echo "$html_content" | grep -oP '<meta[^>]*property="og:description"[^>]*content="\K[^"]*' | head -1)
          if [ -z "$og_description" ]; then
            og_description="Latest release of gdvm - Godot Version Manager"
          fi

          og_image=$(echo "$html_content" | grep -oP '<meta[^>]*property="og:image"[^>]*content="\K[^"]*' | head -1)

          embed_external="{
            \"uri\": \"$release_url\",
            \"title\": $(echo "$og_title" | jq -R '.'),
            \"description\": $(echo "$og_description" | jq -R '.')
          }"

          if [ -n "$og_image" ]; then
            if [[ "$og_image" != http* ]]; then
              og_image="https://github.com$og_image"
            fi

            temp_image="/tmp/og_image"
            curl -sL "$og_image" -o "$temp_image"
            image_content_type=$(file -b --mime-type "$temp_image" 2>/dev/null || echo "application/octet-stream")

            if [[ "$image_content_type" == image/* ]]; then
              blob_response=$(curl -s -X POST "https://bsky.social/xrpc/com.atproto.repo.uploadBlob" \
                -H "Authorization: Bearer $BSKY_TOKEN" \
                -H "Content-Type: $image_content_type" \
                --data-binary "@$temp_image")

              blob_ref=$(echo "$blob_response" | jq '.blob')
              blob_mime=$(echo "$blob_response" | jq -r '.blob.mimeType // empty')

              if [ "$blob_ref" != "null" ] && [[ "$blob_mime" == image/* ]]; then
                embed_external=$(echo "$embed_external" | jq --argjson thumb "$blob_ref" '. + {"thumb": $thumb}')
                echo "✅ Image uploaded successfully ($blob_mime)."
              else
                echo "⚠️ Image blob not usable, is mimeType $blob_mime. Continuing without thumbnail."
              fi
            else
              echo "⚠️ Fetched OpenGraph asset is not an image, is type $image_content_type. Continuing without thumbnail."
            fi

            rm -f "$temp_image"
          else
            echo "⚠️ No OpenGraph image found, continuing without thumbnail."
          fi

          jq -n \
            --arg repo "$BSKY_DID" \
            --arg collection "app.bsky.feed.post" \
            --arg type "app.bsky.feed.post" \
            --argjson text "$post_text" \
            --arg createdAt "$timestamp" \
            --argjson facets "$facets" \
            --arg embed_type "app.bsky.embed.external" \
            --argjson external "$embed_external" \
            '{
              repo: $repo,
              collection: $collection,
              record: {
                "$type": $type,
                text: $text,
                createdAt: $createdAt,
                facets: $facets,
                embed: {
                  "$type": $embed_type,
                  external: $external
                }
              }
            }' > /tmp/post_payload.json

          post_response=$(curl -s -X POST "https://bsky.social/xrpc/com.atproto.repo.createRecord" \
            -H "Authorization: Bearer $BSKY_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data-binary "@/tmp/post_payload.json")

          rm -f /tmp/post_payload.json

          if echo "$post_response" | jq -e '.uri' > /dev/null; then
            post_uri=$(echo "$post_response" | jq -r '.uri')
            echo "✅ Successfully posted to Bluesky!"
            echo "Post URI: $post_uri"
          else
            echo "❌ Failed to post to Bluesky"
            echo "Response: $post_response"
            exit 1
          fi

  delete-artifacts:
    name: Delete Artifacts
    needs: [publish]
    if: needs.publish.result == 'success'
    uses: ./.github/workflows/cleanup-artifacts.yml
    permissions:
      contents: read
      actions: write
